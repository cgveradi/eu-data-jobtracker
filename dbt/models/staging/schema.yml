version: 2

models:
  - name: stg_jobs
    description: "Cleaned job postings from Adzuna, one row per posting."
    columns:
      - name: job_title
        description: "Job posting title."
        tests:
          - not_null

      - name: company_name
        description: "Hiring company name."
        tests:
          - not_null

      - name: redirect_url
        description: "Link to the original posting. Used as a natural dedup key."
        tests:
          - not_null
          - unique

      - name: country_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['nl', 'de', 'es', 'gb']
