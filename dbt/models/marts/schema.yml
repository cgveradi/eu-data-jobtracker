version: 2

models:
  - name: skills_extracted
    description: "One row per job posting, with boolean flags for whether each tracked skill/tool is mentioned in the description."
    columns:
      - name: redirect_url
        tests:
          - not_null
          - unique

  - name: skills_long
    description: "Long/tidy format: one row per (posting, skill) pair, only where the skill was mentioned. Built for charting — feeds the 'top skills' visual in Looker Studio."
    columns:
      - name: skill
        tests:
          - not_null
